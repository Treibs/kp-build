<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body { margin: 0; background: #0e1116; }
      #main { position: relative; overflow: visible; }
      .clip {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, sans-serif;
      }
      /* Same clipping box, but it now sizes to its content: width holds the
         text, height is auto, and the text wraps. scrollWidth/Height match
         clientWidth/Height, so nothing is clipped. */
      .label {
        width: 360px;
        height: auto;
        overflow: hidden;
        font-size: 34px;
        font-weight: 700;
        color: #e8eef9;
        background: #1b2330;
        border-radius: 12px;
        padding: 16px;
        box-sizing: border-box;
        line-height: 1.15;
      }
    </style>
  </head>
  <body>
    <div
      data-composition-id="main"
      data-start="0"
      data-duration="5"
      data-width="1920"
      data-height="1080"
    >
      <div class="clip" id="s1" data-start="0" data-duration="5" data-track-index="0">
        <div class="label">Enterprise onboarding checklist for new customer accounts</div>
      </div>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        tl.from(".label", { opacity: 0, duration: 0.6, ease: "power2.out" }, 0.2);
        window.__timelines["main"] = tl;
      </script>
    </div>
  </body>
</html>
