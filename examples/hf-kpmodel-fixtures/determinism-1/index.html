<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      html, body { margin: 0; }
      #main { background: #0d0d12; color: #f5f5f5; font-family: sans-serif; }
      .clip { width: 100%; height: 100%; }
      .dot {
        position: absolute;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: #6ad1ff;
      }
    </style>
  </head>
  <body>
    <div data-composition-id="main" data-start="0" data-duration="5" data-width="1920" data-height="1080">
      <div class="clip" id="s1" data-start="0" data-duration="5" data-track-index="0">
        <div class="dot" id="dot1"></div>
        <div class="dot" id="dot2"></div>
        <div class="dot" id="dot3"></div>
      </div>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        // Seeded PRNG (mulberry32) — deterministic: same seed yields the same
        // sequence on every capture pass, so frames agree.
        function mulberry32(a) {
          return function () {
            a |= 0;
            a = (a + 0x6d2b79f5) | 0;
            let t = Math.imul(a ^ (a >>> 15), 1 | a);
            t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
        }
        const rand = mulberry32(1337);
        const dots = ["#dot1", "#dot2", "#dot3"];
        dots.forEach((sel, i) => {
          const x = rand() * 1800;
          const y = rand() * 1000;
          tl.fromTo(sel, { x: 960, y: 540, opacity: 0 }, { x: x, y: y, opacity: 1, duration: 0.6, ease: "power3.out" }, 0.1 + i * 0.15);
        });
        window.__timelines["main"] = tl;
      </script>
    </div>
  </body>
</html>
