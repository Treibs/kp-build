<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      .clip {
        visibility: hidden;
      }
      #s1 {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        background: #0d1117;
        color: #e6edf3;
        font-family: sans-serif;
        font-size: 96px;
      }
    </style>
  </head>
  <body>
    <!-- FIXED: the ROOT composition div carries data-duration (the total length). Without it the runtime
         has no totalDuration, so `inspect` cannot build the timeline and fails — and `lint` won't flag it. -->
    <div
      data-composition-id="main"
      data-start="0"
      data-duration="5"
      data-width="1920"
      data-height="1080"
    >
      <div class="clip" id="s1" data-start="0" data-duration="5" data-track-index="0">
        <span id="title">Root data-duration</span>
      </div>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        tl.from("#title", { y: 60, opacity: 0, duration: 0.6, ease: "power3.out" }, 0.2);
        window.__timelines["main"] = tl;
      </script>
    </div>
  </body>
</html>
