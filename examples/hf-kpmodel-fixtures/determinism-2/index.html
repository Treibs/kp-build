<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      html, body { margin: 0; }
      #main { background: #07131a; color: #eaf6ff; font-family: sans-serif; }
      .clip { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
      .stamp { font-size: 120px; font-weight: 700; }
    </style>
  </head>
  <body>
    <div data-composition-id="main" data-start="0" data-duration="5" data-width="1920" data-height="1080">
      <div class="clip" id="s1" data-start="0" data-duration="5" data-track-index="0">
        <div class="stamp" id="stamp">EVEN</div>
      </div>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        // Deterministic: content is fixed at author time, no wall-clock reads.
        // Any per-frame behaviour is driven by the GSAP timeline position.
        tl.from("#stamp", { y: 60, opacity: 0, duration: 0.6, ease: "power3.out" }, 0.2);
        window.__timelines["main"] = tl;
      </script>
    </div>
  </body>
</html>
