<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      .clip {
        visibility: hidden;
      }
      #bg {
        width: 100%;
        height: 100%;
        background: #0d1117;
      }
      #card {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        color: #e6edf3;
        font-family: sans-serif;
        font-size: 96px;
      }
    </style>
  </head>
  <body>
    <div
      data-composition-id="main"
      data-start="0"
      data-duration="5"
      data-width="1920"
      data-height="1080"
    >
      <!-- FIXED: two clips that are on screen at the same time sit on DISTINCT data-track-index
           values (0 and 1). Same-track clips must never overlap in time — that violates the render
           contract and makes `inspect` fail to build the timeline. -->
      <div class="clip" id="bg" data-start="0" data-duration="5" data-track-index="0"></div>
      <div class="clip" id="card" data-start="0.5" data-duration="4" data-track-index="1">
        <span id="title">Distinct Tracks</span>
      </div>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        tl.from("#title", { y: 60, opacity: 0, duration: 0.6, ease: "power3.out" }, 0.6);
        window.__timelines["main"] = tl;
      </script>
    </div>
  </body>
</html>
