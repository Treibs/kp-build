<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body { margin: 0; background: #0e1116; }
      #main { position: relative; overflow: visible; }
      .clip {
        position: absolute;
        inset: 0;
        font-family: Arial, sans-serif;
      }
      /* Same card and text, moved inward so the whole box and its text rect
         sit comfortably inside the 1920x1080 canvas. */
      .card {
        position: absolute;
        left: 120px;
        top: 120px;
        width: 420px;
        background: #1b2330;
        border-radius: 16px;
        padding: 28px;
      }
      .title {
        font-size: 48px;
        font-weight: 700;
        color: #e8eef9;
        line-height: 1.1;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div
      data-composition-id="main"
      data-start="0"
      data-duration="5"
      data-width="1920"
      data-height="1080"
    >
      <div class="clip" id="s1" data-start="0" data-duration="5" data-track-index="0">
        <div class="card">
          <p class="title">Launch metrics</p>
        </div>
      </div>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        tl.from(".card", { opacity: 0, duration: 0.6, ease: "power2.out" }, 0.2);
        window.__timelines["main"] = tl;
      </script>
    </div>
  </body>
</html>
