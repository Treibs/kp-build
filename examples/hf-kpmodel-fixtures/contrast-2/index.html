<!doctype html><html><head><meta charset="utf-8"/>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>html,body{margin:0;background:#3a3a3a}#main{position:relative;width:1920px;height:1080px;overflow:hidden;font-family:Georgia,serif}
.sc{display:flex;flex-direction:column;justify-content:center;width:100%;height:100%;padding:120px 160px;gap:28px;box-sizing:border-box}
.t{font-size:90px;font-weight:800;color:#f5f7fa}
.x{font-size:120px;font-weight:800;color:#f5f7fa;max-width:1300px}</style></head>
<body><div data-composition-id="main" data-start="0" data-duration="5" data-width="1920" data-height="1080">
<div class="clip" id="s1" data-start="0" data-duration="5" data-track-index="0"><div class="sc">
<div class="t" id="t1">Quarterly Review</div><div class="x" id="b1">All-Weather Performance</div></div></div>
<script>window.__timelines=window.__timelines||{};const tl=gsap.timeline({paused:true});
tl.from("#t1",{y:40,duration:0.6,ease:"power3.out"},0.2);tl.from("#b1",{y:30,duration:0.5,ease:"power2.out"},0.5);
window.__timelines["main"]=tl;</script></div></body></html>
