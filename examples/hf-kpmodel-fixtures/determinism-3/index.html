<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      html, body { margin: 0; }
      #main { background: #100a18; color: #f3e9ff; font-family: sans-serif; }
      .clip { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
      .pulse {
        width: 240px;
        height: 240px;
        border-radius: 50%;
        background: #c08bff;
      }
    </style>
  </head>
  <body>
    <div data-composition-id="main" data-start="0" data-duration="5" data-width="1920" data-height="1080">
      <div class="clip" id="s1" data-start="0" data-duration="5" data-track-index="0">
        <div class="pulse" id="pulse"></div>
      </div>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        // Finite repeat computed from composition duration (5s) / cycle (1s):
        // repeat: Math.floor(5 / 1) - 1 = 4 → 5 cycles fit exactly in 5s.
        const totalDuration = 5;
        const cycleDuration = 1; // 0.5s out + 0.5s yoyo back
        tl.to("#pulse", {
          scale: 1.2,
          duration: 0.5,
          yoyo: true,
          repeat: Math.floor(totalDuration / cycleDuration) - 1,
          ease: "sine.inOut",
        }, 0);
        window.__timelines["main"] = tl;
      </script>
    </div>
  </body>
</html>
