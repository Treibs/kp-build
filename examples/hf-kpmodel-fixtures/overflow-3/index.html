<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body { margin: 0; background: #0e1116; }
      #main { position: relative; overflow: visible; }
      .clip {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, sans-serif;
      }
      .card {
        width: 600px;
        height: 360px;
        overflow: hidden;
        background: #1b2330;
        border-radius: 20px;
        position: relative;
      }
      /* The inner panel now fits inside the clipping card, with margin to
         spare, so it stays within the container box. */
      .panel {
        position: absolute;
        top: 40px;
        left: 40px;
        width: 520px;
        height: 280px;
        background: #243044;
        border: 3px solid #3b82f6;
      }
    </style>
  </head>
  <body>
    <div
      data-composition-id="main"
      data-start="0"
      data-duration="5"
      data-width="1920"
      data-height="1080"
    >
      <div class="clip" id="s1" data-start="0" data-duration="5" data-track-index="0">
        <div class="card">
          <div class="panel"></div>
        </div>
      </div>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        tl.from(".card", { opacity: 0, scale: 0.9, duration: 0.6, ease: "power2.out" }, 0.2);
        window.__timelines["main"] = tl;
      </script>
    </div>
  </body>
</html>
